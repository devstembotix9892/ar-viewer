<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AR Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>

  <style>
    :root {
      --controls-gap: 8px;
      --controls-bottom: max(18px, env(safe-area-inset-bottom));
      --btn-size: 54px;
      --btn-size-mobile: 46px;
    }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      min-height: 100vh;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }
    a-scene {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }
    #instructions {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 18px;
      background: rgba(0, 0, 0, 0.6);
      padding: 16px 28px;
      z-index: 10;
      border-radius: 14px;
      max-width: 90%;
      box-shadow: 0 4px 24px #0004;
      letter-spacing: 0.02em;
      backdrop-filter: blur(4px);
      border: 1.5px solid rgba(255,255,255,0.12);
      animation: fadeInDown 1s cubic-bezier(.23,1.01,.32,1) 0.2s both;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translate(-50%, -30px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }
    .glass-controls {
      position: fixed;
      bottom: var(--controls-bottom);
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: var(--controls-gap);
      /* background: rgba(255,255,255,0.10); */
      border-radius: 22px;
      box-shadow: 0 8px 32px 0 rgba(31,38,135,0.18);
      padding: 9px 5px;
      backdrop-filter: blur(10px);
      border: 1.5px solid rgba(255,255,255,0.18);
      animation: controlsPopIn 1.2s cubic-bezier(.23,1.01,.32,1) 0.5s both;
    }
    .new-controls-layout .move-controls {
      margin: 0 6px;
    }
    .side-zoom-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .zoom-side-btn {
      font-size: 28px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(135deg, #007bff 0%, #00c6ff 100%);
      color: #fff;
      box-shadow: 0 2px 8px #007bff22;
      min-width: 0;
      margin: 0;
      padding: 0;
    }
    .zoom-side-btn:hover, .zoom-side-btn:focus {
      background: linear-gradient(135deg, #00c6ff 0%, #007bff 100%);
      color: #fff;
      box-shadow: 0 6px 18px #00c6ff44;
      transform: scale(1.08);
    }
    @keyframes controlsPopIn {
      from { opacity: 0; transform: translate(-50%, 40px) scale(0.95); }
      to { opacity: 1; transform: translate(-50%, 0) scale(1); }
    }
    .move-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .move-row {
      display: flex;
      flex-direction: row;
      gap: 12px;
    }
    .glass-btn {
      font-size: 20px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.18);
      color: #fff;
      box-shadow: 0 2px 8px #0002;
      padding: 0 18px;
      height: 44px;
      min-width: 110px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      font-weight: 500;
      outline: none;
      letter-spacing: 0.01em;
      margin: 0 0 0 0;
    }
    .glass-btn:hover, .glass-btn:focus {
      background: rgba(0,123,255,0.22);
      color: #fff;
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 6px 18px #007bff44;
    }
    .zoom-btn {
      min-width: 120px;
      height: 42px;
      font-size: 17px;
      border-radius: 10px;
      margin-bottom: 2px;
      margin-top: 2px;
      background: linear-gradient(90deg, #007bff 0%, #00c6ff 100%);
      color: #fff;
      box-shadow: 0 2px 8px #007bff22;
    }
    .zoom-btn:hover, .zoom-btn:focus {
      background: linear-gradient(90deg, #00c6ff 0%, #007bff 100%);
      color: #fff;
      box-shadow: 0 6px 18px #00c6ff44;
    }
    .round-btn {
      width: var(--btn-size);
      height: var(--btn-size);
      border-radius: 50%;
      font-size: 26px;
      background: rgba(34,34,34,0.85);
      color: #fff;
      box-shadow: 0 2px 8px #0003;
      padding: 0;
      min-width: 0;
      margin: 0;
    }
    .round-btn:hover, .round-btn:focus {
      background: linear-gradient(135deg, #007bff 0%, #00c6ff 100%);
      color: #fff;
      box-shadow: 0 6px 18px #007bff44;
      transform: scale(1.08);
    }
    #mode-toggle {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: 12px;
      z-index: 35;
      border: 0;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.24);
    }
    body.webxr-ar-mode {
      background: #05070a;
      color: #fff;
    }
    body.webxr-ar-mode #scene,
    body.webxr-ar-mode #controls-wrapper,
    body.webxr-ar-mode #mode-toggle {
      display: none;
    }
    #webxr-viewer {
      display: none;
    }
    body.webxr-ar-mode #webxr-viewer {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 20%, rgba(38, 135, 255, 0.26), transparent 34%), #05070a;
      overflow: hidden;
    }
    #webxr-canvas-host {
      position: fixed;
      inset: 0;
      z-index: 1;
    }
    #webxr-panel {
      position: relative;
      z-index: 2;
      width: min(88vw, 360px);
      padding: 18px;
      border-radius: 8px;
      background: rgba(10, 14, 20, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.38);
      text-align: center;
      backdrop-filter: blur(10px);
    }
    #webxr-title {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 800;
    }
    #webxr-status {
      min-height: 42px;
      margin: 0 0 14px;
      font-size: 14px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.82);
    }
    #webxr-start,
    #webxr-fallback {
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }
    #webxr-start {
      background: #2f80ff;
      color: #fff;
    }
    #webxr-fallback {
      display: none;
      margin-top: 10px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }
    body.webxr-session-active #webxr-panel {
      display: none;
    }
    body.editor-viewport-mode {
      background:
        linear-gradient(180deg, rgba(70, 156, 219, 0.82) 0%, rgba(238, 246, 255, 0.78) 54%, rgba(255, 202, 91, 0.72) 100%);
    }
    body.editor-viewport-mode #instructions {
      left: 12px;
      right: auto;
      transform: none;
      max-width: calc(100% - 150px);
      font-size: 13px;
      padding: 10px 12px;
    }
    @media (max-width: 600px) {
      .glass-controls {
        padding: 10px;
        gap: 6px;
        flex-direction: row;
        border-radius: 18px;
      }
      .move-row {
        gap: 6px;
      }
      .round-btn {
        width: var(--btn-size-mobile);
        height: var(--btn-size-mobile);
        font-size: 22px;
      }
      .zoom-side-btn {
        width: var(--btn-size-mobile);
        height: var(--btn-size-mobile);
        font-size: 24px;
      }
      #instructions {
        font-size: 14px;
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
  <div id="instructions">Loading AR Viewer...</div>
  <div id="webxr-viewer" aria-live="polite">
    <div id="webxr-canvas-host"></div>
    <div id="webxr-panel">
      <h1 id="webxr-title">Blockzie AR</h1>
      <p id="webxr-status">Loading 3D model...</p>
      <button id="webxr-start" type="button">Start WebXR AR</button>
      <button id="webxr-fallback" type="button">Open Marker AR</button>
    </div>
  </div>
  <button id="mode-toggle" type="button">Editor View</button>
  <div id="controls-wrapper" class="glass-controls new-controls-layout">
    <div class="side-zoom-btn">
      <button id="btn-zoom-in" class="glass-btn round-btn zoom-side-btn" title="Zoom In">+</button>
    </div>
    <div id="move-controls" class="move-controls">
      <button id="btn-up" class="glass-btn round-btn">&uarr;</button>
      <div class="move-row">
        <button id="btn-left" class="glass-btn round-btn">&larr;</button>
        <button id="btn-down" class="glass-btn round-btn">&darr;</button>
        <button id="btn-right" class="glass-btn round-btn">&rarr;</button>
      </div>
      <button id="btn-center" class="glass-btn">Center</button>
    </div>
    <div class="side-zoom-btn">
      <button id="btn-zoom-out" class="glass-btn round-btn zoom-side-btn" title="Zoom Out">-</button>
    </div>
  </div>
  
<a-scene id="scene" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
  <!-- <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;"> -->
    <a-assets id="assets"></a-assets>

    <!-- <a-marker preset="hiro" id="hiro-marker"> -->
      <a-marker type="pattern" url="./Blockzie-Pattern-img.patt" id="custom-marker">
<a-entity id="model"
          position="0 0.10 0"
          animation-mixer="clip: *; loop: repeat"
          scale="0.25 0.18 0.18"
          rotation="0 90 0"
           visible="false">
</a-entity>
 <!-- animation="property: rotation; to: -90 360 0; loop: true; dur: 8000" -->
        
    </a-marker>

    <a-entity camera></a-entity>
     
    <a-light type="ambient" color="#ffffff" intensity="1"></a-light>
    <a-light type="directional" position="1 1 0.5" intensity="1"></a-light>
  </a-scene>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const webxrParams = new URLSearchParams(window.location.search);
    const isWebXRMode = webxrParams.get('xr') === '1' || webxrParams.get('mode') === 'webxr' || webxrParams.get('view') === 'webxr';

    if (isWebXRMode) {
      document.body.classList.add('webxr-ar-mode');

      const modelUrl = webxrParams.get('url');
      const statusEl = document.getElementById('webxr-status');
      const startBtn = document.getElementById('webxr-start');
      const fallbackBtn = document.getElementById('webxr-fallback');
      const canvasHost = document.getElementById('webxr-canvas-host');
      const instructions = document.getElementById('instructions');
      const isLive = webxrParams.get('live') === '1';
      const liveSessionId = webxrParams.get('session');
      const liveWsUrl = webxrParams.get('ws');

      if (instructions) instructions.style.display = 'none';

      let renderer = null;
      let scene = null;
      let camera = null;
      let modelRoot = null;
      let liveSocket = null;
      const objectByUuid = new Map();
      const objectByNameType = new Map();

      function setStatus(message) {
        if (statusEl) statusEl.textContent = message;
      }

      function showFallback() {
        if (!fallbackBtn) return;
        fallbackBtn.style.display = 'block';
        fallbackBtn.onclick = () => {
          const nextParams = new URLSearchParams(window.location.search);
          nextParams.delete('xr');
          nextParams.set('view', 'ar');
          window.location.search = nextParams.toString();
        };
      }

      function frameModel(object) {
        const box = new THREE.Box3().setFromObject(object);
        if (box.isEmpty()) return;

        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const maxDimension = Math.max(size.x, size.y, size.z, 0.001);
        const scale = Math.min(0.9 / maxDimension, 1.6);

        object.position.set(-center.x * scale, -box.min.y * scale - 0.18, -2.2 - center.z * scale);
        object.scale.setScalar(scale);
        object.rotation.set(0, 0, 0);
        object.updateMatrixWorld(true);
      }

      function buildLiveIndex() {
        objectByUuid.clear();
        objectByNameType.clear();
        if (!modelRoot) return;

        modelRoot.traverse((obj) => {
          if (!obj || !obj.isObject3D) return;
          objectByUuid.set(obj.uuid, obj);

          const key = `${obj.name || ''}::${obj.type || ''}`;
          if (!objectByNameType.has(key)) objectByNameType.set(key, []);
          objectByNameType.get(key).push(obj);
        });
      }

      function applyLiveFrame(objects) {
        if (!Array.isArray(objects)) return;

        objects.forEach((item) => {
          let target = objectByUuid.get(item.id);
          if (!target && item.n) {
            const matches = objectByNameType.get(`${item.n}::${item.t || ''}`);
            if (matches && matches.length === 1) target = matches[0];
          }

          if (!target) return;
          if (item.p && item.p.length === 3) target.position.set(item.p[0], item.p[1], item.p[2]);
          if (item.q && item.q.length === 4) target.quaternion.set(item.q[0], item.q[1], item.q[2], item.q[3]);
          if (item.s && item.s.length === 3) target.scale.set(item.s[0], item.s[1], item.s[2]);
          if (typeof item.v === 'boolean') target.visible = item.v;
        });
      }

      function connectLiveStreamIfNeeded() {
        if (!isLive || !liveSessionId || !liveWsUrl || typeof WebSocket === 'undefined') return;
        if (liveSocket && (liveSocket.readyState === WebSocket.OPEN || liveSocket.readyState === WebSocket.CONNECTING)) return;

        try {
          liveSocket = new WebSocket(liveWsUrl);
          liveSocket.addEventListener('open', () => {
            liveSocket.send(JSON.stringify({
              type: 'join',
              role: 'receiver',
              sessionId: liveSessionId,
              ts: Date.now()
            }));
          });
          liveSocket.addEventListener('message', (event) => {
            let msg = null;
            try {
              msg = JSON.parse(event.data);
            } catch (err) {
              return;
            }

            if (!msg || msg.sessionId !== liveSessionId) return;
            if (msg.type !== 'frame' && msg.type !== 'snapshot') return;
            applyLiveFrame(msg.objects);
          });
        } catch (err) {
          console.error('Live WebXR stream failed:', err);
        }
      }

      async function startARSession() {
        if (!navigator.xr) {
          setStatus('WebXR AR is not supported in this browser. Use Chrome on Android, or open Marker AR.');
          showFallback();
          return;
        }

        try {
          const supported = await navigator.xr.isSessionSupported('immersive-ar');
          if (!supported) {
            setStatus('WebXR AR is not available on this device. Marker AR can still open this model.');
            showFallback();
            return;
          }

          const session = await navigator.xr.requestSession('immersive-ar', {
            requiredFeatures: ['local'],
            optionalFeatures: ['dom-overlay', 'light-estimation'],
            domOverlay: { root: document.body }
          });

          renderer.xr.setReferenceSpaceType('local');
          await renderer.xr.setSession(session);
          document.body.classList.add('webxr-session-active');
          setStatus('WebXR AR started');

          session.addEventListener('end', () => {
            document.body.classList.remove('webxr-session-active');
            setStatus('AR session ended. Tap Start WebXR AR to open it again.');
          });
        } catch (err) {
          console.error('Unable to start WebXR AR:', err);
          setStatus('Could not start WebXR AR. Please allow camera access and try again.');
          showFallback();
        }
      }

      function initWebXRViewer() {
        if (!modelUrl) {
          setStatus('No model URL provided.');
          showFallback();
          return;
        }

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 30);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        renderer.setClearColor(0x000000, 0);
        canvasHost.appendChild(renderer.domElement);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x778899, 1.2));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.1);
        directionalLight.position.set(1, 2, 1);
        scene.add(directionalLight);

        const loader = new GLTFLoader();
        loader.load(
          modelUrl,
          (gltf) => {
            modelRoot = gltf.scene;
            if (gltf.animations && gltf.animations.length > 0) {
              const mixer = new THREE.AnimationMixer(modelRoot);
              modelRoot.userData.__blockzieMixer = mixer;
              gltf.animations.forEach((clip) => mixer.clipAction(clip).play());
            }

            frameModel(modelRoot);
            scene.add(modelRoot);
            buildLiveIndex();
            connectLiveStreamIfNeeded();
            setStatus('Model ready. Tap Start WebXR AR to view it in your space.');
            if (startBtn) startBtn.disabled = false;
          },
          undefined,
          (err) => {
            console.error('WebXR model load failed:', err);
            setStatus('Failed to load the 3D model.');
            showFallback();
          }
        );

        const clock = new THREE.Clock();
        renderer.setAnimationLoop(() => {
          const delta = clock.getDelta();
          if (modelRoot?.userData?.__blockzieMixer) {
            modelRoot.userData.__blockzieMixer.update(delta);
          }
          renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });

        if (startBtn) {
          startBtn.disabled = true;
          startBtn.addEventListener('click', startARSession);
        }
      }

      initWebXRViewer();
    }
  </script>

  <script>
    const initialParams = new URLSearchParams(window.location.search);
    // const isWebXRMode = initialParams.get('xr') === '1' || initialParams.get('mode') === 'webxr' || initialParams.get('view') === 'webxr';
    const isEditorViewportMode = initialParams.get('view') === 'editor' || initialParams.get('mode') === 'viewport';

    if (!isWebXRMode && isEditorViewportMode) {
      document.body.classList.add('editor-viewport-mode');
      const sceneEl = document.getElementById('scene');
      const markerEl = document.getElementById('custom-marker');
      const modelEl = document.getElementById('model');
      const cameraEl = document.querySelector('[camera]');

      if (sceneEl) {
        sceneEl.removeAttribute('arjs');
        sceneEl.setAttribute('background', 'color: transparent');
        sceneEl.setAttribute('renderer', 'alpha: true; antialias: true');
        sceneEl.setAttribute('vr-mode-ui', 'enabled: false');
      }

      if (modelEl && sceneEl) {
        modelEl.setAttribute('position', '0 0 -4');
        modelEl.setAttribute('scale', '1 1 1');
        modelEl.setAttribute('rotation', '0 0 0');
        modelEl.setAttribute('visible', 'true');
        sceneEl.appendChild(modelEl);
      }

      if (markerEl) markerEl.remove();

      if (cameraEl) {
        cameraEl.setAttribute('position', '0 2.2 4.8');
        cameraEl.setAttribute('rotation', '-18 0 0');
        cameraEl.setAttribute('look-controls', 'enabled: true');
        cameraEl.setAttribute('wasd-controls', 'enabled: false');
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      if (isWebXRMode) return;

      console.log('📄 DOM fully loaded, initializing AR scene...');
      
      const params = new URLSearchParams(window.location.search);
      const modelUrl = params.get('url');
      const viewportMode = params.get('view') === 'editor' || params.get('mode') === 'viewport';
      const isLive = params.get('live') === '1';
      const liveSessionId = params.get('session');
      const liveWsUrl = params.get('ws');
      const modelEntity = document.getElementById('model');
      // const marker = document.getElementById('hiro-marker');
      const marker = document.getElementById('custom-marker');

      const instructions = document.getElementById('instructions');
      const modeToggle = document.getElementById('mode-toggle');
      let liveSocket = null;
      const objectByUuid = new Map();
      const objectByNameType = new Map();

      if (modeToggle) {
        modeToggle.textContent = viewportMode ? 'Open Camera AR' : 'Editor View';
        modeToggle.addEventListener('click', () => {
          const nextParams = new URLSearchParams(window.location.search);
          nextParams.set('view', viewportMode ? 'ar' : 'editor');
          window.location.search = nextParams.toString();
        });
      }

      // Movement controls
      const btnUp = document.getElementById('btn-up');
      const btnDown = document.getElementById('btn-down');
      const btnLeft = document.getElementById('btn-left');
      const btnRight = document.getElementById('btn-right');
      const btnCenter = document.getElementById('btn-center');

      // Zoom controls
      const btnZoomIn = document.getElementById('btn-zoom-in');
      const btnZoomOut = document.getElementById('btn-zoom-out');

      // Move step size
      const MOVE_STEP = 0.1;

      // Zoom step size (Z axis)
      const ZOOM_STEP = 0.1;
      let centerPosition = { x: 0, y: 0.5, z: 0 };

      function moveModel(dx, dy) {
        if (!modelEntity) return;
        const pos = modelEntity.getAttribute('position');
        // Y is up in A-Frame, X is left/right
        modelEntity.setAttribute('position', {
          x: pos.x + dx,
          y: pos.y + dy,
          z: pos.z
        });
      }

      function zoomModel(dz) {
        if (!modelEntity) return;
        const pos = modelEntity.getAttribute('position');
        modelEntity.setAttribute('position', {
          x: pos.x,
          y: pos.y,
          z: pos.z + dz
        });
      }

      function centerModel() {
        if (!modelEntity) return;
        modelEntity.setAttribute('position', centerPosition);
      }

      function addEditorViewportHelpers() {
        if (!viewportMode || !scene || scene.dataset.editorHelpersReady === 'true') return;
        const THREE = window.AFRAME && window.AFRAME.THREE;
        if (!THREE || !scene.object3D) return;

        const grid = new THREE.Group();
        grid.name = 'BlockzieEditorViewportGrid';

        const grid1 = new THREE.GridHelper(30, 30, 0x555555, 0x777777);
        const grid2 = new THREE.GridHelper(30, 6, 0x333333, 0x555555);
        grid1.position.z = -4;
        grid2.position.z = -4;
        grid.add(grid1);
        grid.add(grid2);
        scene.object3D.add(grid);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x778899, 0.85);
        hemiLight.name = 'BlockzieEditorViewportHemisphereLight';
        scene.object3D.add(hemiLight);

        scene.dataset.editorHelpersReady = 'true';
      }

      function frameModelInEditorViewport() {
        if (!viewportMode || !modelEntity || !modelEntity.object3D) return;
        const THREE = window.AFRAME && window.AFRAME.THREE;
        if (!THREE) return;

        const modelObject = modelEntity.object3D;
        modelObject.updateMatrixWorld(true);

        const box = new THREE.Box3().setFromObject(modelObject);
        if (box.isEmpty()) return;

        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const maxDimension = Math.max(size.x, size.y, size.z, 0.001);
        const scale = Math.min(2.2 / maxDimension, 3.5);
        const yOffset = -box.min.y * scale;

        modelObject.scale.setScalar(scale);
        modelObject.position.set(
          -center.x * scale,
          yOffset,
          -4 - center.z * scale
        );
        modelObject.rotation.set(0, 0, 0);
        modelObject.visible = true;
        modelObject.updateMatrixWorld(true);

        centerPosition = {
          x: modelObject.position.x,
          y: modelObject.position.y,
          z: modelObject.position.z
        };
      }

      function buildLiveIndex() {
        objectByUuid.clear();
        objectByNameType.clear();

        if (!modelEntity || !modelEntity.object3D) return;

        modelEntity.object3D.traverse((obj) => {
          if (!obj || !obj.isObject3D) return;
          objectByUuid.set(obj.uuid, obj);

          const key = `${obj.name || ''}::${obj.type || ''}`;
          if (!objectByNameType.has(key)) objectByNameType.set(key, []);
          objectByNameType.get(key).push(obj);
        });
      }

      function applyLiveFrame(objects) {
        if (!Array.isArray(objects)) return;

        objects.forEach((item) => {
          let target = objectByUuid.get(item.id);
          if (!target && item.n) {
            const key = `${item.n}::${item.t || ''}`;
            const matches = objectByNameType.get(key);
            if (matches && matches.length === 1) target = matches[0];
          }

          if (!target) return;

          if (item.p && item.p.length === 3) target.position.set(item.p[0], item.p[1], item.p[2]);
          if (item.q && item.q.length === 4) target.quaternion.set(item.q[0], item.q[1], item.q[2], item.q[3]);
          if (item.s && item.s.length === 3) target.scale.set(item.s[0], item.s[1], item.s[2]);
          if (typeof item.v === 'boolean') target.visible = item.v;
        });
      }

      function connectLiveStreamIfNeeded() {
        if (!isLive || !liveSessionId || !liveWsUrl) return;
        if (typeof WebSocket === 'undefined') return;
        if (liveSocket && (liveSocket.readyState === WebSocket.OPEN || liveSocket.readyState === WebSocket.CONNECTING)) return;

        try {
          liveSocket = new WebSocket(liveWsUrl);

          liveSocket.addEventListener('open', () => {
            liveSocket.send(JSON.stringify({
              type: 'join',
              role: 'receiver',
              sessionId: liveSessionId,
              ts: Date.now()
            }));
            instructions.textContent = 'Live AR connected';
          });

          liveSocket.addEventListener('message', (event) => {
            let msg = null;
            try {
              msg = JSON.parse(event.data);
            } catch (err) {
              return;
            }

            if (!msg || msg.sessionId !== liveSessionId) return;
            if (msg.type !== 'frame' && msg.type !== 'snapshot') return;
            applyLiveFrame(msg.objects);
          });

          liveSocket.addEventListener('close', () => {
            instructions.textContent = 'Live AR disconnected';
          });
        } catch (err) {
          console.error('Live WS failed:', err);
        }
      }

      if (btnUp) btnUp.addEventListener('click', () => moveModel(0, MOVE_STEP));
      if (btnDown) btnDown.addEventListener('click', () => moveModel(0, -MOVE_STEP));
      if (btnLeft) btnLeft.addEventListener('click', () => moveModel(-MOVE_STEP, 0));
      if (btnRight) btnRight.addEventListener('click', () => moveModel(MOVE_STEP, 0));
      if (btnCenter) btnCenter.addEventListener('click', centerModel);

      if (btnZoomIn) btnZoomIn.addEventListener('click', () => zoomModel(-ZOOM_STEP)); // Move model closer
      if (btnZoomOut) btnZoomOut.addEventListener('click', () => zoomModel(ZOOM_STEP)); // Move model farther

      // Touch gesture support for model rotation (orbit) and zoom
      let lastTouch = null;
      let lastDistance = null;
      let lastRotation = null;
      const scene = document.querySelector('a-scene');
      if (!scene || !modelEntity || (!viewportMode && !marker)) {
        console.error('Required AR elements are missing.');
        return;
      }

      if (viewportMode) {
        if (scene.hasLoaded) {
          addEditorViewportHelpers();
        } else {
          scene.addEventListener('loaded', addEditorViewportHelpers, { once: true });
        }
      }

      function getTouchPos(touch) {
        return { x: touch.clientX, y: touch.clientY };
      }

      let lastAngle = null;
      scene.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          lastTouch = getTouchPos(e.touches[0]);
          lastRotation = modelEntity.getAttribute('rotation');
        } else if (e.touches.length === 2) {
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          lastDistance = Math.sqrt(dx * dx + dy * dy);
          lastAngle = Math.atan2(dy, dx);
          lastRotation = modelEntity.getAttribute('rotation');
        }
      }, { passive: true });

      scene.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (e.touches.length === 1 && lastTouch && lastRotation) {
          const newTouch = getTouchPos(e.touches[0]);
          const dx = newTouch.x - lastTouch.x;
          const dy = newTouch.y - lastTouch.y;
          // Horizontal drag rotates around Y, vertical drag around X.
          modelEntity.setAttribute('rotation', {
            x: lastRotation.x - dy * 0.3,
            y: lastRotation.y + dx * 0.3,
            z: lastRotation.z
          });
          lastTouch = newTouch;
          lastRotation = modelEntity.getAttribute('rotation');
        } else if (e.touches.length === 2 && lastDistance !== null && lastAngle !== null && lastRotation) {
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          const newDistance = Math.sqrt(dx * dx + dy * dy);
          const dz = (lastDistance - newDistance) / 200; // scale factor for zoom
          zoomModel(dz);
          // Z rotation (two-finger rotate)
          const newAngle = Math.atan2(dy, dx);
          const dAngle = (newAngle - lastAngle) * (180 / Math.PI); // radians to degrees
          modelEntity.setAttribute('rotation', {
            x: lastRotation.x,
            y: lastRotation.y,
            z: lastRotation.z + dAngle
          });
          lastDistance = newDistance;
          lastAngle = newAngle;
          lastRotation = modelEntity.getAttribute('rotation');
        }
      }, { passive: false });

      scene.addEventListener('touchend', (e) => {
        if (e.touches.length === 0) {
          lastTouch = null;
          lastDistance = null;
          lastRotation = null;
          lastAngle = null;
        }
      });

      if (!modelUrl) {
        console.warn('❗ No model URL provided in the query string');
        instructions.textContent = '⚠️ No model URL provided. Add ?url=yourModel.glb to the link.';
        instructions.style.background = 'rgba(255, 0, 0, 0.6)';
        return;
      }

      console.log('🌐 Loading Model URL:', modelUrl);
      instructions.textContent = '⏳ Loading 3D model...';

      // Load the model
      modelEntity.setAttribute('gltf-model', modelUrl);

      // let billboardEnabled = true;
      // let billboardFrameHandler = null;
      // const toggleBillboardBtn = document.getElementById('toggle-billboard');

      modelEntity.addEventListener('model-loaded', () => {
        console.log('✅ Model successfully loaded');
        modelEntity.setAttribute('visible', viewportMode ? 'true' : 'false');
        modelEntity.setAttribute('animation-mixer', 'clip: *; loop: repeat');
        frameModelInEditorViewport();
        instructions.textContent = viewportMode
          ? 'Editor viewport. Use touch to rotate and buttons to move.'
          : '📸 Point your camera at the Blockzie marker';

      });

   
      modelEntity.addEventListener('model-loaded', () => {
        buildLiveIndex();
        connectLiveStreamIfNeeded();
      });

      modelEntity.addEventListener('model-error', (e) => {
        console.error('❌ Error loading model:', e.detail);
        instructions.textContent = '⚠️ Failed to load model.';
        instructions.style.background = 'rgba(255, 0, 0, 0.6)';
      });

      // marker.addEventListener('markerFound', () => {
      //   console.log('📍 Marker found');
      // });

      // marker.addEventListener('markerLost', () => {
      //   console.log('🚫 Marker lost');
      // });
     
      let placed = false;
      const cameraEl = document.querySelector('[camera]');
      const cameraObj = cameraEl ? cameraEl.object3D : null;
      if (!cameraObj) {
        console.error('Camera object not available.');
        return;
      }

      if (viewportMode) {
        frameModelInEditorViewport();
        return;
      }

      marker.addEventListener('markerFound', () => {

  if (placed) return;

        const modelObj = modelEntity.object3D;

        // Attach once to camera so it stays visible without pattern.
        cameraObj.add(modelObj);
        modelEntity.setAttribute('position', '0 -0.10 -2.4');
        modelEntity.setAttribute('scale', '0.18 0.18 0.18');
        modelEntity.setAttribute('rotation', '0 90 0');
        modelEntity.setAttribute('visible', 'true');
        centerPosition = { x: 0, y: -0.10, z: -2.4 };

  // ⭐ detach model from marker
        marker.object3D.visible = false;

        placed = true;
        instructions.textContent = 'Model placed. Pattern no longer required until restart.';
});
    });

    
  </script>
